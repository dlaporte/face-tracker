name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate

          # xcodegen wipes the entitlements file — restore it
          cat > Sources/FaceTracker.entitlements << 'ENTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.app-sandbox</key>
              <true/>
              <key>com.apple.security.device.camera</key>
              <true/>
              <key>com.apple.security.automation.apple-events</key>
              <true/>
          </dict>
          </plist>
          ENTEOF

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Set the keychain as the default and add to search list
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Verify
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build
        run: |
          xcodebuild build \
            -project FaceTracker.xcodeproj \
            -scheme FaceTracker \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--options runtime --timestamp" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO

      - name: Run tests
        run: |
          xcodebuild test \
            -project FaceTracker.xcodeproj \
            -scheme FaceTracker \
            -destination 'platform=macOS'

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set +e  # Don't exit on error — we need to capture the log
          APP_PATH="build/Build/Products/Release/FaceTracker.app"

          # Create a zip for notarization
          ditto -c -k --keepParent "$APP_PATH" FaceTracker-notarize.zip

          # Verify codesigning before submitting
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "=== Embedded entitlements ==="
          codesign -d --entitlements - "$APP_PATH" 2>&1
          echo "=== End entitlements ==="

          # Submit for notarization and wait, capture output
          SUBMIT_OUTPUT=$(xcrun notarytool submit FaceTracker-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1)
          SUBMIT_EXIT=$?
          echo "$SUBMIT_OUTPUT"

          # Extract submission ID
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')
          echo "Submission ID: $SUBMISSION_ID"

          if [ $SUBMIT_EXIT -ne 0 ] || echo "$SUBMIT_OUTPUT" | grep -q "Invalid"; then
            echo "=== Notarization failed — fetching log ==="
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              notarization-log.json 2>&1 || true
            echo "=== Notarization Log ==="
            cat notarization-log.json 2>/dev/null || echo "Could not fetch log"
            echo "========================"
            exit 1
          fi

          # Staple the notarization ticket to the app
          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        env:
          TAG_NAME: ${{ github.ref_name }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          APP_PATH="build/Build/Products/Release/FaceTracker.app"
          VERSION="${TAG_NAME#v}"

          # Create DMG contents
          mkdir -p dmg_contents
          cp -R "$APP_PATH" dmg_contents/
          ln -s /Applications dmg_contents/Applications

          # Create DMG
          hdiutil create \
            -volname "FaceTracker $VERSION" \
            -srcfolder dmg_contents \
            -ov \
            -format UDZO \
            "FaceTracker-${VERSION}.dmg"

          # Notarize the DMG too
          xcrun notarytool submit "FaceTracker-${VERSION}.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "FaceTracker-${VERSION}.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: FaceTracker-DMG
          path: "*.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.dmg"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
