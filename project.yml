name: FaceTracker
options:
  deploymentTarget:
    macOS: "13.0"
  bundleIdPrefix: com.facetracker
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  FaceTracker:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.facetracker.app
        SWIFT_VERSION: 5.9
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "-"
        OTHER_LDFLAGS: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Sources/FaceTracker.entitlements
  FaceTrackerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: FaceTracker
    settings:
      base:
        SWIFT_VERSION: 5.9
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.facetracker.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/FaceTracker.app/Contents/MacOS/FaceTracker"
        BUNDLE_LOADER: "$(TEST_HOST)"
